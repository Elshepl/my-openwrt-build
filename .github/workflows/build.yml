name: Pro OpenWrt Build Machine

on:
  workflow_dispatch:
    inputs:
      pkg_url:
        description: 'Add Package url (اتركه فاضي لو الباكدج موجودة علشان ميمسحش تعديلاتك اللي موجودة)'
        required: false
        default: ''
      pkg_name:
        description: 'package name (e.g. luci-app-homeproxy or homeproxy)'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/lib/jvm
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget zstd

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-24.10.5-ramips-mt7621

      - name: Download and Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget https://immortalwrt.kyarucloud.moe/releases/24.10.5/targets/ramips/mt7621/immortalwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk
          tar -I zstd -xf *.tar.zst -C sdk --strip-components=1
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        run: |
          PKG_URL="${{ github.event.inputs.pkg_url }}"
          CLEAN_NAME=$(basename "${{ github.event.inputs.pkg_name }}")
          mkdir -p packages-src

          # ============================================================
          # CASE 1: المستخدم أعطى URL → clone وحفظ في packages-src
          # ============================================================
          if [ -n "$PKG_URL" ]; then
            echo "━━━ MODE: Clone from URL ━━━"
            echo "    URL : $PKG_URL"
            echo "    Name: $CLEAN_NAME"

            rm -rf "packages-src/$CLEAN_NAME"
            git clone --depth 1 "$PKG_URL" "packages-src/$CLEAN_NAME"

            # تنظيف ملفات git من السورس المحفوظ
            find "packages-src/$CLEAN_NAME" -name ".git"       -exec rm -rf {} + 2>/dev/null || true
            find "packages-src/$CLEAN_NAME" -name ".github"    -exec rm -rf {} + 2>/dev/null || true
            find "packages-src/$CLEAN_NAME" -name ".gitignore" -exec rm -f  {} + 2>/dev/null || true

            echo "    ✓ Saved to packages-src/$CLEAN_NAME"
            echo "PKG_MODE=external" >> $GITHUB_ENV

          else
            # ============================================================
            # CASE 2: مفيش URL → ابحث في packages-src أولاً (أولويتك أنت)
            # ============================================================

            # البحث بـ partial match في packages-src
            FOUND_LOCAL=$(find packages-src -maxdepth 1 -type d -name "*${CLEAN_NAME}*" | head -5)
            COUNT_LOCAL=$(echo "$FOUND_LOCAL" | grep -c . 2>/dev/null || echo 0)
            [ -z "$FOUND_LOCAL" ] && COUNT_LOCAL=0

            if [ "$COUNT_LOCAL" -eq 1 ]; then
              echo "━━━ MODE: Use your modified package from packages-src ━━━"
              FULL_NAME=$(basename "$FOUND_LOCAL")
              echo "    Found: $FULL_NAME"
              echo "PKG_MODE=local_src"   >> $GITHUB_ENV
              echo "PKG_FULL=$FULL_NAME"  >> $GITHUB_ENV

            elif [ "$COUNT_LOCAL" -gt 1 ]; then
              echo "ERROR: Multiple packages match '$CLEAN_NAME' in packages-src:"
              echo "$FOUND_LOCAL" | xargs -I{} basename {}
              echo "──────────────────────────────"
              echo "Please use the full package name."
              exit 1

            else
              # ============================================================
              # CASE 3: مش موجودة عندك → دور في feeds الرسمية
              # ============================================================
              echo "━━━ MODE: Search in official SDK feeds ━━━"
              FOUND_FEED=$(find sdk/package -maxdepth 5 -type d -name "*${CLEAN_NAME}*" \
                           ! -path "*/.git/*" | head -5)
              COUNT_FEED=$(echo "$FOUND_FEED" | grep -c . 2>/dev/null || echo 0)
              [ -z "$FOUND_FEED" ] && COUNT_FEED=0

              if [ "$COUNT_FEED" -eq 1 ]; then
                FULL_NAME=$(basename "$FOUND_FEED")
                echo "    Found in feeds: $FULL_NAME"
                echo "PKG_MODE=feed"        >> $GITHUB_ENV
                echo "PKG_FULL=$FULL_NAME"  >> $GITHUB_ENV

              elif [ "$COUNT_FEED" -gt 1 ]; then
                echo "ERROR: Multiple packages match '$CLEAN_NAME' in feeds:"
                echo "$FOUND_FEED" | xargs -I{} basename {}
                echo "──────────────────────────────"
                echo "Please use the full package name."
                exit 1

              else
                echo "ERROR: Package '$CLEAN_NAME' not found anywhere."
                echo ""
                echo "Searched in:"
                echo "  1. packages-src/  (your repo)"
                echo "  2. sdk/package/   (official feeds)"
                exit 1
              fi
            fi
          fi

      - name: Copy Package into SDK
        run: |
          CLEAN_NAME=$(basename "${{ github.event.inputs.pkg_name }}")

          if [ "$PKG_MODE" = "external" ]; then
            # جاي من clone جديد → خد من packages-src اللي حفظناها
            FULL_NAME=$(find packages-src -maxdepth 1 -type d -name "*${CLEAN_NAME}*" \
                        | head -1 | xargs basename)
            rm -rf "sdk/package/$FULL_NAME"
            cp -r "packages-src/$FULL_NAME" "sdk/package/"
            echo "REAL_PKG_NAME=$FULL_NAME" >> $GITHUB_ENV

          elif [ "$PKG_MODE" = "local_src" ]; then
            # جاي من packages-src (بعد تعديل) → انسخ للـ SDK
            rm -rf "sdk/package/$PKG_FULL"
            cp -r "packages-src/$PKG_FULL" "sdk/package/"
            echo "REAL_PKG_NAME=$PKG_FULL" >> $GITHUB_ENV

          else
            # feed رسمي → موجود بالفعل في SDK
            echo "REAL_PKG_NAME=$PKG_FULL" >> $GITHUB_ENV
          fi

          echo "✓ Building: $REAL_PKG_NAME"

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/${{ env.REAL_PKG_NAME }}/compile -j$(nproc) V=s

      - name: Push Results to Repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          # نسخ ملفات الـ bin إلى files/
          mkdir -p files
          cp -r sdk/bin/. files/

          git add files/

          # لو الباكدج خارجية → ارفع سورسها كمان
          if [ "$PKG_MODE" = "external" ] || [ "$PKG_MODE" = "local_src" ]; then
            git add packages-src/
          fi

          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi

          git commit -m "build(${{ env.REAL_PKG_NAME }}): $(date '+%Y-%m-%d %H:%M UTC')"
          git push origin main
