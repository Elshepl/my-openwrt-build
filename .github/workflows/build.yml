name: Build ImmortalWrt Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget zstd

      - name: Download SDK
        run: |
          wget https://immortalwrt.kyarucloud.moe/releases/24.10.5/targets/ramips/mt7621/immortalwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst

      - name: Extract SDK
        run: |
          mkdir sdk
          tar -I zstd -xf *.tar.zst -C sdk --strip-components=1

      - name: Update and Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile Package
        run: |
          cd sdk
          make defconfig
          make package/htop/compile -j$(nproc) V=s

      - name: Upload Built Packages
        uses: actions/upload-artifact@v4
        with:
          name: my-compiled-packages
          path: sdk/bin/
