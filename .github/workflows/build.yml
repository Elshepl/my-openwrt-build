name: Pro OpenWrt Build Machine

on:
  workflow_dispatch:
    inputs:
      pkg_url:
        description: 'رابط GitHub للباكدج - اتركه فاضي لو الباكدج موجود بالفعل'
        required: false
        default: ''
      pkg_name:
        description: 'اسم فولدر الباكدج (مثلاً: htop)'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget zstd

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-24.10.5-ramips-mt7621

      - name: Download and Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget https://immortalwrt.kyarucloud.moe/releases/24.10.5/targets/ramips/mt7621/immortalwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mkdir sdk
          tar -I zstd -xf *.tar.zst -C sdk --strip-components=1
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        run: |
          PKG_URL="${{ github.event.inputs.pkg_url }}"
          PKG_NAME="${{ github.event.inputs.pkg_name }}"

          if [ -n "$PKG_URL" ]; then
            echo ">>> Mode: Clone from URL"
            echo "    URL:  $PKG_URL"
            echo "    Dest: sdk/package/$PKG_NAME"
            cd sdk/package
            git clone "$PKG_URL" "$PKG_NAME"
          else
            echo ">>> Mode: Use existing package"
            echo "    Looking for: sdk/package/$PKG_NAME"
            if [ ! -d "sdk/package/$PKG_NAME" ]; then
              echo ""
              echo "ERROR: Package '$PKG_NAME' not found in sdk/package/"
              echo ""
              echo "Available packages:"
              ls sdk/package/
              exit 1
            fi
            echo "    Found: sdk/package/$PKG_NAME"
          fi

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/${{ github.event.inputs.pkg_name }}/compile -j$(nproc) V=s

      - name: Push Built Packages to Repository
        run: |
          PKG_NAME="${{ github.event.inputs.pkg_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # سحب آخر تغييرات الـ main قبل ما نضيف
          git pull --rebase origin main

          # نسخ محتويات bin إلى مجلد files في الريبو (مش بيمسح القديم)
          mkdir -p files
          cp -r sdk/bin/. files/

          # commit + push
          git add files/
          git diff --cached --quiet && echo "Nothing new to commit" && exit 0
          git commit -m "build($PKG_NAME): $(date '+%Y-%m-%d %H:%M UTC')"
          git push origin main
